<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — АССМБ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root[data-theme="dark"]{--bg:#0f1117;--surface:#181c27;--border:#2a2f3d;--accent:#4f8ef7;--text:#e2e6f0;--muted:#6b7280;--err-bg:rgba(248,113,113,.1);--err-border:rgba(248,113,113,.3);--err:#f87171;--grid:rgba(79,142,247,.04);--sh:rgba(79,142,247,.08)}
  :root[data-theme="light"]{--bg:#f0f2f8;--surface:#fff;--border:#d1d8e8;--accent:#2563eb;--text:#1e293b;--muted:#64748b;--err-bg:rgba(220,38,38,.08);--err-border:rgba(220,38,38,.25);--err:#dc2626;--grid:rgba(37,99,235,.04);--sh:rgba(37,99,235,.1)}

  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:background .3s,color .3s}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:44px 40px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 0 60px var(--sh);transition:background .3s,border-color .3s}

  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .logo{font-family:'Unbounded',sans-serif;font-weight:600;font-size:13px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase}

  .theme-btn{background:transparent;border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;transition:all .2s}
  .theme-btn:hover{border-color:var(--accent);color:var(--accent)}

  h1{font-family:'Unbounded',sans-serif;font-weight:300;font-size:22px;color:var(--text);margin-bottom:32px;line-height:1.3}

  .field{margin-bottom:18px}
  label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:11px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:border-color .2s,background .3s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.1)}

  .err{background:var(--err-bg);border:1px solid var(--err-border);border-radius:6px;padding:9px 14px;font-size:12px;color:var(--err);margin-bottom:18px}

  .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:12px;font-family:'Unbounded',sans-serif;font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:6px}
  .btn-primary:hover{opacity:.9}
  .btn-primary:active{transform:scale(.98)}

  .help-link{display:block;text-align:center;margin-top:14px;font-size:11px;color:var(--muted);cursor:pointer;transition:color .2s;text-decoration:underline;text-underline-offset:3px}
  .help-link:hover{color:var(--accent)}

  /* Информационный попап */
  .info-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);align-items:center;justify-content:center}
  .info-overlay.open{display:flex}
  .info-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px 32px;max-width:340px;width:100%;font-size:13px;line-height:1.8;position:relative}
  .info-box h3{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;margin-bottom:14px;color:var(--text);letter-spacing:.06em}
  .info-box p{color:var(--muted)}
  .info-box p b{color:var(--text)}
  .info-close{position:absolute;top:12px;right:14px;background:transparent;border:none;cursor:pointer;font-size:16px;color:var(--muted);transition:color .2s}
  .info-close:hover{color:var(--text)}
</style>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')</script>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo">АССМБ</div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️ Светлая</button>
  </div>

  <h1>Журнал<br>изменений</h1>

  {% if error %}<div class="err">{{ error }}</div>{% endif %}

  <form method="post" action="/login">
    <div class="field"><label>Логин</label><input type="text" name="username" autocomplete="username" autofocus required></div>
    <div class="field"><label>Пароль</label><input type="password" name="password" autocomplete="current-password" required></div>
    <button class="btn-primary" type="submit">Войти</button>
  </form>

  <span class="help-link" onclick="document.getElementById('infoOverlay').classList.add('open')">
    Регистрация / Забыл пароль
  </span>
</div>

<!-- Инфо-попап -->
<div class="info-overlay" id="infoOverlay" onclick="closeInfo(event)">
  <div class="info-box">
    <button class="info-close" onclick="document.getElementById('infoOverlay').classList.remove('open')">✕</button>
    <h3>Регистрация и восстановление пароля</h3>
    <p>За регистрацией или восстановлением пароля обращайтесь к системному администратору:</p>
    <p style="margin-top:15px"><b>Габдуллин А.М.</b></p>
	<p><b>theroonekz@gmail.com</b></p>
    <p><b>Job Searching :)</b></p>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
  const html = document.documentElement;
  const btn  = document.getElementById('themeBtn');
  setTheme(localStorage.getItem('theme')||'light');

  function setTheme(t){html.setAttribute('data-theme',t);btn.textContent=t==='dark'?'☀️ Светлая':'🌙 Тёмная';localStorage.setItem('theme',t)}
  function toggleTheme(){setTheme(html.getAttribute('data-theme')==='dark'?'light':'dark')}
  </script>
</body>
</html>
